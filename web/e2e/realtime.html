<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>chat-rs realtime E2E</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, sans-serif;
    }

    body {
      margin: 0;
      padding: 24px;
      max-width: 1120px;
      line-height: 1.4;
    }

    h1, h2 {
      margin: 0 0 12px;
    }

    section {
      border-top: 1px solid CanvasText;
      margin-top: 24px;
      padding-top: 16px;
    }

    label {
      display: grid;
      gap: 4px;
      margin: 8px 0;
      max-width: 560px;
    }

    input, textarea, button {
      font: inherit;
    }

    input, textarea {
      box-sizing: border-box;
      width: 100%;
      padding: 8px;
    }

    textarea {
      min-height: 72px;
      resize: vertical;
    }

    button {
      margin: 4px 4px 4px 0;
      padding: 8px 12px;
    }

    code, pre {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    pre {
      border: 1px solid CanvasText;
      max-height: 420px;
      overflow: auto;
      padding: 12px;
      white-space: pre-wrap;
    }

    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }

    .status {
      font-weight: 700;
    }
  </style>
</head>
<body>
  <h1>chat-rs realtime E2E</h1>
  <p>
    Test-only same-origin harness for the authenticated <code>/api/v1/ws</code>
    realtime boundary. Remove this page after verification.
  </p>

  <section>
    <h2>Session</h2>
    <p>Status: <span id="session-status" class="status">unknown</span></p>
    <button type="button" id="refresh-session">Refresh session</button>
    <button type="button" id="login-existing">Login existing</button>
    <button type="button" id="logout">Logout</button>
    <form method="post" action="/auth/oidc/start" autocomplete="off">
      <label>
        Admission code
        <input
          name="admission_code"
          id="admission-code"
          type="password"
          minlength="43"
          maxlength="43"
          autocomplete="off"
          spellcheck="false"
          required
        >
      </label>
      <button type="submit">Login with code</button>
    </form>
  </section>

  <section>
    <h2>WebSocket</h2>
    <p>Status: <span id="socket-status" class="status">closed</span></p>
    <button type="button" id="connect">Connect</button>
    <button type="button" id="connect-no-protocol">Connect without protocol</button>
    <button type="button" id="close-socket">Close socket</button>
    <button type="button" id="open-nine">Open 9 sockets</button>
    <button type="button" id="close-extra">Close extra sockets</button>
  </section>

  <section>
    <h2>Chat Workflow</h2>
    <div class="grid">
      <div>
        <label>
          Conversation title
          <input id="conversation-title" value="Realtime E2E">
        </label>
        <label>
          Conversation ID
          <input id="conversation-id" inputmode="numeric" autocomplete="off">
        </label>
        <button type="button" id="create-conversation">Create conversation</button>
        <button type="button" id="fetch-conversations">Fetch conversations</button>
      </div>
      <div>
        <label>
          Message body
          <textarea id="message-body">hello from realtime e2e</textarea>
        </label>
        <label>
          Message ID
          <input id="message-id" inputmode="numeric" autocomplete="off">
        </label>
        <button type="button" id="post-message">Post message</button>
        <button type="button" id="fetch-message">Fetch one message</button>
        <button type="button" id="fetch-messages">Fetch latest messages</button>
      </div>
    </div>
  </section>

  <section>
    <h2>Subscription</h2>
    <button type="button" id="subscribe">Subscribe</button>
    <button type="button" id="unsubscribe">Unsubscribe</button>
    <button type="button" id="send-invalid-json">Send invalid JSON</button>
    <button type="button" id="send-binary">Send binary</button>
  </section>

  <section>
    <h2>Event Log</h2>
    <button type="button" id="clear-log">Clear log</button>
    <button type="button" id="export-log">Export log</button>
    <pre id="log" aria-live="polite"></pre>
  </section>

  <script>
    const state = {
      csrfToken: null,
      socket: null,
      extraSockets: [],
      events: [],
    };

    const byId = (id) => document.getElementById(id);
    const logNode = byId("log");

    function log(event, detail = {}) {
      const entry = {
        at: new Date().toISOString(),
        event,
        detail,
      };
      state.events.push(entry);
      logNode.textContent += `${JSON.stringify(entry)}\n`;
      logNode.scrollTop = logNode.scrollHeight;
    }

    function setSessionStatus(value) {
      byId("session-status").textContent = value;
    }

    function setSocketStatus(value) {
      byId("socket-status").textContent = value;
    }

    function conversationId() {
      return byId("conversation-id").value.trim();
    }

    function messageId() {
      return byId("message-id").value.trim();
    }

    async function api(path, options = {}) {
      const headers = new Headers(options.headers || {});
      if (options.json !== undefined) {
        headers.set("content-type", "application/json");
        options.body = JSON.stringify(options.json);
        delete options.json;
      }
      if (options.csrf !== false && state.csrfToken) {
        headers.set("x-csrf-token", state.csrfToken);
      }
      const response = await fetch(path, {
        credentials: "same-origin",
        cache: "no-store",
        ...options,
        headers,
      });
      let body = null;
      const text = await response.text();
      if (text.length > 0) {
        try {
          body = JSON.parse(text);
        } catch {
          body = text;
        }
      }
      return {
        status: response.status,
        ok: response.ok,
        headers: Object.fromEntries(response.headers.entries()),
        body,
      };
    }

    async function refreshSession() {
      const result = await api("/api/v1/session", { csrf: false });
      if (result.ok) {
        state.csrfToken = result.body.csrf_token;
        setSessionStatus(`authenticated user=${result.body.user.id}`);
        log("session.ok", { user: result.body.user });
      } else {
        state.csrfToken = null;
        setSessionStatus(`unauthenticated status=${result.status}`);
        log("session.failed", { status: result.status, body: result.body });
      }
    }

    function attachSocket(socket, label) {
      socket.addEventListener("open", () => {
        log(`${label}.open`, { protocol: socket.protocol });
        if (label === "ws") {
          setSocketStatus(`open protocol=${socket.protocol}`);
        }
      });
      socket.addEventListener("message", (event) => {
        let parsed = event.data;
        try {
          parsed = JSON.parse(event.data);
        } catch {
          // Keep original text for invalid server output.
        }
        log(`${label}.message`, parsed);
        if (parsed && parsed.conversation_id) {
          byId("conversation-id").value = parsed.conversation_id;
        }
        if (parsed && parsed.message_id) {
          byId("message-id").value = parsed.message_id;
        }
      });
      socket.addEventListener("error", () => {
        log(`${label}.error`);
      });
      socket.addEventListener("close", (event) => {
        log(`${label}.close`, {
          code: event.code,
          reason: event.reason,
          wasClean: event.wasClean,
        });
        if (label === "ws") {
          setSocketStatus(`closed code=${event.code}`);
          state.socket = null;
        }
      });
    }

    function connect(withProtocol = true) {
      if (state.socket) {
        log("ws.connect.skipped", { reason: "already_open" });
        return;
      }
      const url = new URL("/api/v1/ws", window.location.href);
      url.protocol = url.protocol === "https:" ? "wss:" : "ws:";
      const socket = withProtocol
        ? new WebSocket(url, "chat.v1")
        : new WebSocket(url);
      state.socket = socket;
      setSocketStatus("connecting");
      attachSocket(socket, "ws");
    }

    function sendSocket(value) {
      if (!state.socket || state.socket.readyState !== WebSocket.OPEN) {
        log("ws.send.failed", { reason: "not_open" });
        return;
      }
      state.socket.send(value);
      log("ws.sent", typeof value === "string" ? JSON.parse(JSON.stringify(value)) : "binary");
    }

    async function createConversation() {
      const title = byId("conversation-title").value;
      const result = await api("/api/v1/conversations", {
        method: "POST",
        json: { title },
      });
      log("http.create_conversation", result);
      if (result.ok && result.body && result.body.id) {
        byId("conversation-id").value = result.body.id;
      }
    }

    async function fetchConversations() {
      const result = await api("/api/v1/conversations?limit=20", { csrf: false });
      log("http.list_conversations", result);
    }

    async function postMessage() {
      const id = conversationId();
      const body = byId("message-body").value;
      const result = await api(`/api/v1/conversations/${encodeURIComponent(id)}/messages`, {
        method: "POST",
        json: { body },
      });
      log("http.post_message", result);
      if (result.ok && result.body && result.body.id) {
        byId("message-id").value = result.body.id;
      }
    }

    async function fetchMessage() {
      const cid = conversationId();
      const mid = messageId();
      const result = await api(
        `/api/v1/conversations/${encodeURIComponent(cid)}/messages/${encodeURIComponent(mid)}`,
        { csrf: false },
      );
      log("http.get_message", result);
    }

    async function fetchMessages() {
      const cid = conversationId();
      const result = await api(
        `/api/v1/conversations/${encodeURIComponent(cid)}/messages?limit=20`,
        { csrf: false },
      );
      log("http.list_messages", result);
    }

    function subscribe() {
      sendSocket(JSON.stringify({
        type: "subscribe",
        conversation_id: conversationId(),
      }));
    }

    function unsubscribe() {
      sendSocket(JSON.stringify({
        type: "unsubscribe",
        conversation_id: conversationId(),
      }));
    }

    function sendInvalidJson() {
      sendSocket("{not json");
    }

    function sendBinary() {
      if (!state.socket || state.socket.readyState !== WebSocket.OPEN) {
        log("ws.binary.failed", { reason: "not_open" });
        return;
      }
      state.socket.send(new Uint8Array([1, 2, 3, 4]));
      log("ws.binary.sent", { bytes: 4 });
    }

    async function logout() {
      const result = await api("/api/v1/session", { method: "DELETE" });
      log("http.logout", result);
      state.csrfToken = null;
      setSessionStatus(`logged_out status=${result.status}`);
    }

    function openNineSockets() {
      const url = new URL("/api/v1/ws", window.location.href);
      url.protocol = url.protocol === "https:" ? "wss:" : "ws:";
      for (let index = 0; index < 9; index += 1) {
        const socket = new WebSocket(url, "chat.v1");
        state.extraSockets.push(socket);
        attachSocket(socket, `extra${index + 1}`);
      }
      log("extra.open_requested", { count: 9 });
    }

    function closeExtraSockets() {
      for (const socket of state.extraSockets.splice(0)) {
        socket.close(1000, "test done");
      }
      log("extra.close_requested");
    }

    function exportLog() {
      const blob = new Blob([JSON.stringify(state.events, null, 2)], {
        type: "application/json",
      });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = `chat-rs-realtime-e2e-${new Date().toISOString()}.json`;
      anchor.click();
      URL.revokeObjectURL(url);
    }

    byId("refresh-session").addEventListener("click", refreshSession);
    byId("login-existing").addEventListener("click", () => {
      window.location.href = "/auth/oidc/start";
    });
    byId("logout").addEventListener("click", logout);
    byId("connect").addEventListener("click", () => connect(true));
    byId("connect-no-protocol").addEventListener("click", () => connect(false));
    byId("close-socket").addEventListener("click", () => {
      if (state.socket) {
        state.socket.close(1000, "test done");
      }
    });
    byId("open-nine").addEventListener("click", openNineSockets);
    byId("close-extra").addEventListener("click", closeExtraSockets);
    byId("create-conversation").addEventListener("click", createConversation);
    byId("fetch-conversations").addEventListener("click", fetchConversations);
    byId("post-message").addEventListener("click", postMessage);
    byId("fetch-message").addEventListener("click", fetchMessage);
    byId("fetch-messages").addEventListener("click", fetchMessages);
    byId("subscribe").addEventListener("click", subscribe);
    byId("unsubscribe").addEventListener("click", unsubscribe);
    byId("send-invalid-json").addEventListener("click", sendInvalidJson);
    byId("send-binary").addEventListener("click", sendBinary);
    byId("clear-log").addEventListener("click", () => {
      state.events.length = 0;
      logNode.textContent = "";
    });
    byId("export-log").addEventListener("click", exportLog);

    log("harness.loaded", {
      origin: window.location.origin,
      path: window.location.pathname,
    });
  </script>
</body>
</html>
